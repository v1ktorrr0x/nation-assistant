<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nation Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/nation-theme.css">
    <link rel="stylesheet" href="styles/sidepanel.css">
</head>
<body>
    <div class="modern-chat-app">
        <!-- Nation Header with Logo -->
        <header class="nation-header">
            <div class="header-content">
                <div class="brand-section">
                    <div class="logo-container">
                        <img src="title.png" alt="Nation Assistant" class="nation-logo">
                    </div>

                </div>
                <div class="header-actions">
                    <button class="terminal-btn" id="refresh-btn" title="New conversation" aria-label="New conversation">
                        <i class="fas fa-refresh"></i>
                    </button>
                    <button class="terminal-btn" id="settings-btn" title="Settings" aria-label="Settings">
                        <i class="fas fa-cog"></i>
                    </button>
                </div>
            </div>
            
            <!-- Terminal Context Bar -->
            <div class="terminal-context-bar" id="context-bar">
                <div class="context-details">
                    <div class="page-title" id="tab-title">Loading page...</div>
                    <div class="page-url" id="tab-url"></div>
                </div>
            </div>
        </header>

        <!-- Modern Chat Container -->
        <main class="chat-container">
            <div class="chat-messages" id="chat-messages" role="log" aria-live="polite">
                <!-- Welcome message will be inserted here -->
            </div>
        </main>

        <!-- Modern Input Area -->
        <footer class="chat-input-area">
            <div class="input-wrapper">
                <div class="input-container" id="input-container">
                    <textarea 
                        id="chat-input" 
                        class="message-input"
                        placeholder="Message Nation Assistant..."
                        rows="1"
                        maxlength="8000"
                        aria-label="Chat input"
                    ></textarea>
                    <div class="input-actions">
                        <button id="send-btn" class="send-button" disabled aria-label="Send message">
                            <i class="fas fa-arrow-up"></i>
                        </button>
                    </div>
                </div>
                <div class="input-footer">
                    <span class="input-hint">Press Enter to send, Shift+Enter for new line</span>
                </div>
            </div>
        </footer>


    </div>

    <!-- Templates for dynamic content -->
    <template id="welcome-message-template">
        <div class="welcome-message">
            <div class="welcome-icon"><i class="fas fa-robot"></i></div>
            <div class="welcome-title">Welcome to Nation Assistant</div>
            <div class="welcome-subtitle">
              I can help you understand and analyze this webpage. Here are some things you can try:
            </div>
            <div class="welcome-suggestions">
              <button class="suggestion-btn" data-action="analyze">
                📄 Analyze this page
              </button>
              <button class="suggestion-btn" data-action="summarize">
                📝 Summarize content
              </button>
              <button class="suggestion-btn" data-action="key-insights">
                💡 Key insights
              </button>
            </div>
            <div class="welcome-tip">
              💡 <strong>Tip:</strong> Select text on any page and right-click to analyze it directly!
            </div>
        </div>
    </template>

    <template id="error-message-template">
        <div class="message system">
            <div class="error-message">
                <div class="error-header">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span class="error-title"></span>
                </div>
                <div class="error-content"></div>
                <div class="error-actions"></div>
            </div>
        </div>
    </template>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script src="debug-config.js"></script>
    <script src="sidepanel.js"></script>
</body>
</html>
